<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head >
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cabinet Digital{% endblock %}</title>
    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.indigo.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.2" integrity="sha384-Y7hw+L/jvKeWIRRkqWYfPcvVxHzVzn5REgzbawhxAuQGwX1XWe70vji+VSeHOThJ" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/htmx.org@2.0.2/dist/ext/history.js"></script>
</head>
<body hx-boost="true" >
    <header class="container">
        <nav>
            <ul>
                <li><a href="{% url 'home' %}"><strong>Cabinet Digital</strong></a></li>
                </ul>
                <ul>                 
                
                  <li><a href="{% url 'software_list' %}" hx-boost="false">Liste des logiciels</a></li>
                  <li><a href="{% url 'articles' %}" hx-boost="false">Articles</a></li>
                  <li><a href="{% url 'category_list' %}" hx-boost="false">Catégories</a></li>
            </ul>
        </nav>
    </header>
    <main class="container">
    {% block content %}{% endblock %}
  </main>
    <footer class="container">  
        <nav>
            <ul>
                <li>Cabinet Digital</li>
                <li>About us</li>
                <li>Contact</li>
            </ul>
        </nav>  
    </footer>
</body>
</html>
