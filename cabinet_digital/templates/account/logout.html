{% extends "base.html" %}
{% load i18n %}
{% load static %}

{% block title %}Déconnexion - Cabinet Digital{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12 px-4">
  <div class="bg-white rounded-lg shadow-lg overflow-hidden border border-gray-200">
    <div class="p-6">
      <div class="text-center mb-8">
        <img src="{% static 'cabinet_logos/logo_cabinetdigital.png' %}" alt="Cabinet Digital logo" class="h-16 mx-auto mb-4">
        <h1 class="text-2xl font-bold text-gray-900">Déconnexion</h1>
        <p class="text-gray-600 mt-2">Êtes-vous sûr de vouloir vous déconnecter ?</p>
      </div>

      <div class="space-y-4">
        <form method="post" action="{% url 'account_logout' %}">
          {% csrf_token %}
          {% if redirect_field_value %}
          <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
          {% endif %}
          <button type="submit" class="w-full flex items-center justify-center px-6 py-3 bg-black text-white rounded-md hover:bg-gray-800 transition-colors duration-300">
            <span class="font-medium">Confirmer la déconnexion</span>
          </button>
        </form>
        <a href="{% url 'home' %}" class="w-full flex items-center justify-center px-6 py-3 border border-gray-300 rounded-md shadow-sm bg-white hover:bg-gray-50 transition-colors duration-300">
          <span class="text-gray-800 font-medium">Annuler</span>
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
