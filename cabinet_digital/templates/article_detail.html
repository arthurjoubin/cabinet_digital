{% extends "base.html" %}
{% load markdown_extras %}

{% block content %}
<nav class="container-fluid">
  <ul>
    <li><a href="{% url 'articles' %}" role="button" class="outline">Revenir aux articles</a></li>
  </ul>
</nav>

<div class="container">
  <article>
    <header>
      <fieldset role="group" style="display: flex; align-items: center;">
          <img src="{{ article.image.url }}" alt="{{ article.title }}" style="max-width: 20%; width: 20%; height: auto; object-fit: cover; border-radius: 5%; margin-right: 20px;">
        <div>
          <h1>{{ article.title }}</h1>
          <p><small>Published on {{ article.pub_date|date:"F d, Y" }}</small></p>
        </div>
      </fieldset>

    </header>
    <div>
      {{ article.content | markdown | safe }}
    </div>
  </article>
</div>
{% endblock %}
