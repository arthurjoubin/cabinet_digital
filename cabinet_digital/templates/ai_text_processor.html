{% extends 'base.html' %}
{% load markdown_extras %}

{% block extra_head %}
<script src="{{ HTMX_SCRIPT }}" defer></script>
{% endblock %}

{% block content %}
<div class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4">AI Text Processor</h1>
    <form hx-post="{% url 'ai_text_processor' %}" hx-target="#output-container" hx-indicator="#loading" class="space-y-4">
        {% csrf_token %}
        <div>
            <label for="text" class="block mb-2">Text:</label>
            <textarea name="text" id="text" rows="5" class="w-full p-2 border rounded"></textarea>
        </div>
        <div>
            <label for="prompt" class="block mb-2">Prompt:</label>
            <textarea name="prompt" id="prompt" rows="3" class="w-full p-2 border rounded">{{ prompt }}</textarea>
        </div>
        <button type="submit" class="bg-black text-white px-4 py-2 rounded">Process</button>
    </form>
    
    <div id="loading" class="htmx-indicator">Processing...</div>
    
    <div id="output-container" class="mt-8">
        <!-- Output will be inserted here by HTMX -->
    </div>
</div>
{% endblock %}
