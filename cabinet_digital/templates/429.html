{% extends "base.html" %}
{% load static %}

{% block title %}Trop de requêtes - Cabinet Digital{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto my-12 px-4">
  <div class="bg-white rounded-lg shadow-lg overflow-hidden border border-gray-200">
    <div class="p-6">
      <div class="text-center mb-8">
        <img src="{% static 'cabinet_logos/logo_cabinetdigital.png' %}" alt="Cabinet Digital logo" class="h-16 mx-auto mb-4">
        <h1 class="text-2xl font-bold text-gray-900">Trop de requêtes</h1>
        <p class="text-gray-600 mt-2">
          Vous avez effectué trop de tentatives en peu de temps. Veuillez patienter quelques minutes avant de réessayer.
        </p>
      </div>

      <div class="flex justify-center mt-8">
        <a href="{% url 'home' %}" class="inline-flex items-center px-4 py-2 bg-black text-white rounded-md hover:bg-gray-800 transition-colors duration-300">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
          </svg>
          Retour à l'accueil
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
