{% extends 'base.html' %}
{% block content %}
{% block meta_description %}
<title>Contactez-nous - Cabinet Digital</title>
<meta name="description" content="Partenaires ou Experts-Comptables, n'hésitez pas à nous faire vos demandes : ajout, retour d'expérience, proposition, etc">
{% endblock %}

<div class="max-w-md w-full mx-auto space-y-8 p-8 bg-white thin-border border-gray-200 rounded-lg">
    <div>
        <h2 class="mt-6 text-3xl font-bold text-black"> Contactez-nous </h2>
        <p class="mt-2 text-sm text-gray-600"> Nous sommes là pour répondre à vos questions </p>
    </div>
    <form class="mt-8 space-y-6" action="#" method="POST"> {% csrf_token %} <div
            class="rounded-md -space-y-px">
            <div> <label for="name" class="sr-only">Nom</label> <input id="name" name="name" type="text" required
                    class="appearance-none rounded-none relative block w-full px-3 py-2 border thin-border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-1 focus:ring-black focus:border-black focus:z-10 sm:text-sm"
                    placeholder="Nom"> </div>
            <div> <label for="email" class="sr-only">Email</label> <input id="email" name="email" type="email" required
                    class="appearance-none rounded-none relative block w-full px-3 py-2 border thin-border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-1 focus:ring-black focus:border-black focus:z-10 sm:text-sm"
                    placeholder="Email"> </div>
            <div> <label for="message" class="sr-only">Message</label> <textarea id="message" name="message" required
                    class="appearance-none rounded-none relative block w-full px-3 py-2 border thin-border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-1 focus:ring-black focus:border-black focus:z-10 sm:text-sm"
                    placeholder="Votre message" rows="4"></textarea> </div>
        </div>
        <div>
            <button type="submit"
                class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-black hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black">
                Envoyer
            </button>
        </div>
    </form>
</div>

{% endblock %}
