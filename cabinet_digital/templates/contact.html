{% extends 'base.html' %}
{% block content %}
<div class="bg-white p-8 rounded-lg shadow-sm border-2 border-gray-200">
    <h1 class="custom-header">Formulaire de contact</h1>
    <div class="mb-8 text-center text-gray-700 max-w-2xl mx-auto">
        <p class="leading-relaxed">Cabinet Digital est un site indépendant dédié aux entreprises et experts-comptables pour aider dans le choix des outils les plus adaptés à leurs besoins.</p>
    </div>

    <div id="loading-indicator" class="text-center py-4">
        <svg class="animate-spin h-10 w-10 text-gray-500 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="mt-4 text-gray-600">Chargement du formulaire...</p>
    </div>
    <iframe class="airtable-embed" src="https://airtable.com/embed/appOsLjDFcICB05w6/pagwffU8ydmQIxF1s/form" frameborder="0" onmousewheel="" width="100%" height="563" style="background: transparent;" onload="document.getElementById('loading-indicator').style.display='none';"></iframe>
</div>
{% endblock %}
