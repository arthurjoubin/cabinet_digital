{% extends 'base.html' %}
{% block content %}

{% load custom_filters %}

<div class="container mx-auto">
    <h1 class="text-3xl font-light text-black mb-8 border-b thin-border border-gray-200 pb-4 text-center bg-gray-50 py-4 flex items-center justify-center">Catégories de logiciels</h1>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for category in categories%}
        {% if category.name != "Non catégorisé" %}
        <article
            class="bg-white thin-border border-gray-200 rounded-lg overflow-hidden transition-all duration-300 hover:border-gray-400">
            <a href="{% url 'category_detail' category.slug %}" class="block p-6">
                <header class="mb-4">
                    <h3 class="text-xl font-medium text-black">{{ category.name }}</h3>
                </header>
                <p class="text-sm text-gray-600 line-clamp-3">
                    {{ category.description|first_sentence }}
                </p>
            </a>
        </article>
        {% endif %}
        {% endfor %}
    </div>
</div>
{% endblock %}
