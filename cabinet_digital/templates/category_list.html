{% extends 'base.html' %}
{% block content %}
<div class="bg-white p-8 rounded-lg shadow-sm border border-gray-200">
    <h1 class="custom-header">Catégories de logiciels</h1>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        {% for category in categories %}
            <div class="group">
                <a href="{% url 'category_detail' category.slug %}" class="block h-full">
                    <div class="bg-white border border-gray-200 rounded-lg p-4 transition-all duration-300 hover:shadow-md hover:border-sky-100 group-hover:border-sky-200 h-full flex flex-col justify-between">
                        <h2 class="text-lg font-medium text-gray-800 group-hover:text-sky-600 mb-2">{{ category.name }}</h2>
                        <span class="text-sm font-semibold text-sky-600 bg-sky-50 px-2 py-1 rounded-full self-start">
                            {{ category.software_count }} logiciel{% if category.software_count > 1 %}s{% endif %}
                        </span>
                    </div>
                </a>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
