{% extends 'base.html' %}
{% load static %}

{% block meta_description %}
<title>{{ news.title }} - Cabinet Digital</title>
<meta name="description" content="{{ news.excerpt }}">
{% endblock %}

{% block content %}
<article class="max-w-3xl mx-auto bg-white p-8 rounded-lg shadow-sm border border-gray-200">
    <header class="mb-6 border-b border-gray-200 pb-6">
        <div class="flex flex-wrap gap-2 mb-3">
            {% for tag in news.tags.all %}
                <span class="bg-sky-100 text-sky-800 text-xs font-medium px-2.5 py-0.5 rounded">{{ tag.name }}</span>
            {% endfor %}
        </div>
        <h1 class="text-3xl font-bold mb-2">{{ news.title }}</h1>
        <p class="text-gray-500 text-sm">Publié le {{ news.date|date:"d F Y" }}</p>
    </header>

    <div class="prose max-w-none">
        {{ news.content|safe }}
    </div>
</article>
{% endblock %}
